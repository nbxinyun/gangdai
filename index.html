            </div>

    <script>
        // 初始化省份下拉框
        function initProvinces() {
            const select = document.getElementById('destination');
            allProvinces.forEach(province => {
                const option = document.createElement('option');
                option.value = province;
                option.textContent = province;
                select.appendChild(option);
            });
        }

        // 添加规格输入框
        function addSpecInput() {
            const container = document.getElementById('specifications');
            const rows = container.querySelectorAll('.spec-row');
            
            const div = document.createElement('div');
            div.className = 'flex items-center space-x-3 spec-row';
            // 核心修改：新增行的spec-input也改为w-64
            div.innerHTML = `
                <input type="text" placeholder="6250*100*1.05" class="w-40 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 spec-input"onfocus="this.select()">
                <input type="number" placeholder="数量" min="1" value="1" class="w-16 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 quantity-input"onfocus="this.select()">
                <input type="text" readonly placeholder="0.00" class="w-20 px-4 py-2 border border-gray-200 bg-gray-50 rounded-lg text-center weight-display">
                <button class="delete-spec-btn w-8 h-8 flex items-center justify-center text-red-500 hover:text-red-700 rounded-full bg-gray-100 hover:bg-gray-200">
                    <i class="fas fa-times"></i>
                </button>
            `;
            container.appendChild(div);

            // 为删除按钮绑定事件
            bindDeleteBtnEvents();
            // 更新删除按钮禁用状态
            updateDeleteBtnStatus();
            
            // 新增行后立即触发自动计算
            autoCalculateFreight();
        }

        // 绑定删除规格行事件
        function bindDeleteBtnEvents() {
            const deleteBtns = document.querySelectorAll('.delete-spec-btn');
            deleteBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    this.closest('.spec-row').remove();
                    // 重新计算所有规格重量
                    calculateAllSpecWeights();
                    // 更新删除按钮禁用状态
                    updateDeleteBtnStatus();
                    // 删除后自动计算运费
                    autoCalculateFreight();
                });
            });
        }

        // 更新删除按钮禁用状态（至少保留一行）
        function updateDeleteBtnStatus() {
            const rows = document.querySelectorAll('.spec-row');
            rows.forEach((row, index) => {
                const btn = row.querySelector('.delete-spec-btn');
                btn.disabled = rows.length <= 1;
            });
        }

        // 验证规格格式
        function validateSpecFormat(spec) {
            const regex = /^\d+(\.\d+)?\*\d+(\.\d+)?\*\d+(\.\d+)?$/;
            return regex.test(spec.trim());
        }

        // 计算单条规格重量并显示
        function calculateSpecWeight(inputEl, quantityEl, displayEl) {
            const spec = inputEl.value.trim();
            const quantity = parseInt(quantityEl.value) || 1;
            
            if (!spec) {
                displayEl.value = '0.00';
                return 0;
            }
            
            if (!validateSpecFormat(spec)) {
                displayEl.value = '格式错误';
                return -1;
            }
            
            try {
                const [length, width, thickness] = spec.split('*').map(Number);
                if (isNaN(length) || isNaN(width) || isNaN(thickness) || length <= 0 || width <= 0 || thickness <= 0) {
                    displayEl.value = '数值错误';
                    return -1;
                }
                const density = 7.85; // 钢的密度 g/cm³
                const volumeCm3 = (length * width * thickness) / 1000; // 转换为cm³ (mm³ -> cm³)
                const weightKg = (volumeCm3 * density) / 1000 * quantity; // 转换为kg
                const weight = parseFloat(weightKg.toFixed(4));
                displayEl.value = weight.toFixed(2);
                return weight;
            } catch (e) {
                displayEl.value = '计算错误';
                return -1;
            }
        }

        // 计算所有规格重量
        function calculateAllSpecWeights() {
            const specInputs = document.querySelectorAll('.spec-input');
            const quantityInputs = document.querySelectorAll('.quantity-input');
            const weightDisplays = document.querySelectorAll('.weight-display');
            let totalWeight = 0;
            let hasError = false;

            specInputs.forEach((input, index) => {
                const weight = calculateSpecWeight(input, quantityInputs[index], weightDisplays[index]);
                if (weight < 0) {
                    hasError = true;
                } else {
                    totalWeight += weight;
                }
            });

            return { totalWeight, hasError };
        }

        // 渲染重量信息
        function renderWeightInfo() {
            const specWeightResult = calculateAllSpecWeights();
            
            // 显示错误提示
            document.getElementById('specError').classList.toggle('hidden', !specWeightResult.hasError);
            
            // 使用规格计算重量
            if (specWeightResult.hasError) {
                document.getElementById('totalWeight').textContent = '计算错误';
                document.getElementById('recommendedChoice').textContent = '暂无';
                document.getElementById('weightInfoArea').classList.add('hidden');
                return { weight: 0, hasError: true };
            }
            
            document.getElementById('totalWeight').textContent = `${specWeightResult.totalWeight.toFixed(2)} kg`;
            // 显示重量信息区域
            document.getElementById('weightInfoArea').classList.remove('hidden');
            return { weight: specWeightResult.totalWeight, hasError: specWeightResult.hasError };
        }

        // 计算运费（返回价格和明细）
        function calculateFreight(company, province, weight) {
            if (!province || weight <= 0) return { price: 0, detail: '无效参数' };
            try {
                const data = freightData[company];
                if (!data || !data[province]) return { price: 0, detail: '无该地区运费数据' };

                let price = 0;
                let detail = '';

                switch (company) {
                    case 'aneng':
                        const aneng = data[province];
                        const anengCalculated = weight * aneng.per_kg_fee;
                        price = Math.max(aneng.start_fee, anengCalculated);
                        detail = `起步费¥${aneng.start_fee} | 每公斤¥${aneng.per_kg_fee} | 按重量计算¥${anengCalculated.toFixed(2)} | 最终取最大值`;
                        break;
                    case 'shentong':
                        const shentong = data[province];
                        if (weight <= 1) {
                            price = shentong.first_kg_fee;
                            detail = `首1kg¥${shentong.first_kg_fee} | 重量≤1kg`;
                        } else {
                            const additional = (weight + 1) * shentong.additional_kg_fee;
                            price = shentong.first_kg_fee + additional;
                            detail = `首1kg¥${shentong.first_kg_fee} | 续重¥${shentong.additional_kg_fee}/kg | 续重费用¥${additional.toFixed(2)}`;
                        }
                        break;
                    case 'shunxin':
                        const shunxin = data[province];
                        const shunxinCalculated = weight * shunxin.per_kg_fee;
                        price = Math.max(shunxin.start_fee, shunxinCalculated);
                        detail = `起步费¥${shunxin.start_fee} | 每公斤¥${shunxin.per_kg_fee} | 按重量计算¥${shunxinCalculated.toFixed(2)} | 最终取最大值`;
                        break;
                }
                return { 
                    price: parseFloat(price.toFixed(2)),
                    detail: detail
                };
            } catch (e) {
                return { price: 0, detail: '计算异常' };
            }
        }

        // 渲染运费对比
        function renderFreightComparison(province, totalWeight) {
            const container = document.getElementById('freightComparison');
            container.innerHTML = '';
            
            const companies = [
                { id: 'aneng', name: '安能物流' },
                { id: 'shentong', name: '申通快递' },
                { id: 'shunxin', name: '顺心捷达' }
            ];
            
            const results = [];
            companies.forEach(company => {
                const { price, detail } = calculateFreight(company.id, province, totalWeight);
                results.push({ ...company, price, detail });
                
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-100 hover:bg-gray-50';
                tr.innerHTML = `
                    <td class="px-3 py-3 text-left">${company.name}</td>
                    <td class="px-3 py-3 text-center font-medium ${price > 0 ? 'text-blue-600' : 'text-gray-400'}">
                        ${price > 0 ? `¥${price}` : '无数据'}
                    </td>
                    <td class="px-3 py-3 text-center text-sm text-gray-600">
                        ${detail}
                    </td>
                `;
                container.appendChild(tr);
            });

            // 推荐最优方案（过滤无数据的）
            const validResults = results.filter(item => item.price > 0);
            if (validResults.length > 0) {
                const best = validResults.sort((a, b) => a.price - b.price)[0];
                document.getElementById('recommendedCompany').textContent = best.name;
                document.getElementById('recommendedPrice').textContent = `¥${best.price}`;
                // 更新重量区域的推荐选择
                document.getElementById('recommendedChoice').textContent = `${best.name} (¥${best.price})`;
            } else {
                document.getElementById('recommendedCompany').textContent = '暂无可用物流';
                document.getElementById('recommendedPrice').textContent = '¥0.00';
                document.getElementById('recommendedChoice').textContent = '暂无可用物流';
            }
        }

        // 重置规格输入
        function resetSpecInputs() {
            const container = document.getElementById('specifications');
            // 保留第一行并清空 - 核心修改：重置后的行也使用w-64
            container.innerHTML = `
                <div class="flex items-center space-x-3 spec-row">
                    <input type="text" placeholder="6250*100*1.05" class="w-40 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 spec-input"onfocus="this.select()">
                    <input type="number" placeholder="数量" min="1" value="1" class="w-16 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 quantity-input"onfocus="this.select()">
                    <input type="text" readonly placeholder="0.00" class="w-20 px-4 py-2 border border-gray-200 bg-gray-50 rounded-lg text-center weight-display">
                    <button class="delete-spec-btn w-8 h-8 flex items-center justify-center text-red-500 hover:text-red-700 rounded-full bg-gray-100 hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            bindDeleteBtnEvents();
            // 重置推荐选择显示
            document.getElementById('recommendedChoice').textContent = '暂无';
            // 隐藏重量信息区域
            document.getElementById('weightInfoArea').classList.add('hidden');
        }

        // 重置所有输入和结果
        function resetAll() {
            document.getElementById('destination').value = '';
            resetSpecInputs();
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('provinceError').classList.add('hidden');
            document.getElementById('specError').classList.add('hidden');
            document.getElementById('weightInfoArea').classList.add('hidden');
            document.getElementById('recommendedChoice').textContent = '暂无';
        }

        // 自动计算运费的核心函数
        function autoCalculateFreight() {
            // 验证省份选择
            const province = document.getElementById('destination').value;
            if (!province) {
                document.getElementById('provinceError').classList.remove('hidden');
                document.getElementById('resultArea').classList.add('hidden');
                document.getElementById('weightInfoArea').classList.add('hidden');
                document.getElementById('recommendedChoice').textContent = '暂无';
                return;
            } else {
                document.getElementById('provinceError').classList.add('hidden');
            }

            // 计算重量并验证
            const weightResult = renderWeightInfo();
            if (weightResult.hasError || weightResult.weight <= 0) {
                document.getElementById('resultArea').classList.add('hidden');
                document.getElementById('recommendedChoice').textContent = '暂无';
                return;
            }

            // 渲染运费对比
            renderFreightComparison(province, weightResult.weight);
            document.getElementById('resultArea').classList.remove('hidden');
        }

        // 初始化页面
        window.onload = function() {
            initProvinces();
            bindDeleteBtnEvents();
            
            // 添加规格按钮事件
            document.getElementById('addSpecBtn').addEventListener('click', addSpecInput);
            
            // 重置规格按钮事件
            document.getElementById('resetSpecBtn').addEventListener('click', function() {
                resetSpecInputs();
                // 重置后隐藏结果
                document.getElementById('resultArea').classList.add('hidden');
            });
            
            // 重置所有按钮事件
            document.getElementById('resetAllBtn').addEventListener('click', resetAll);
            
            // 规格输入实时验证和计算，并自动触发运费计算
            document.addEventListener('input', function(e) {
                if (e.target.classList.contains('spec-input') || e.target.classList.contains('quantity-input')) {
                    const row = e.target.closest('.spec-row');
                    if (row) {
                        const specInput = row.querySelector('.spec-input');
                        const quantityInput = row.querySelector('.quantity-input');
                        const weightDisplay = row.querySelector('.weight-display');
                        calculateSpecWeight(specInput, quantityInput, weightDisplay);
                        
                        // 输入变化后自动计算运费
                        autoCalculateFreight();
                    }
                }
            });
            
            // 省份选择变化时自动计算运费
            document.getElementById('destination').addEventListener('change', autoCalculateFreight);
        };
    </script>
</body>
</html>
