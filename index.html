    <script>
        // 初始化省份下拉框
        function initProvinces() {
            const select = document.getElementById('destination');
            allProvinces.forEach(province => {
                const option = document.createElement('option');
                option.value = province;
                option.textContent = province;
                select.appendChild(option);
            });
        }

        // 计算锯条重量
        function calculateWeight(spec, quantity) {
            try {
                // 解析规格：长*宽*厚 (单位：mm)
                const [length, width, thickness] = spec.split('*').map(Number);
                if (isNaN(length) || isNaN(width) || isNaN(thickness)) {
                    return 0;
                }
                
                // 密度：7.85 g/cm³ (钢的密度)
                const density = 7.85;
                
                // 计算体积：长(mm) × 宽(mm) × 厚(mm) = mm³
                // 转换为 cm³：mm³ / 1000
                // 计算重量：体积(cm³) × 密度(g/cm³) = g
                // 转换为 kg：g / 1000
                const volumeCm3 = (length * width * thickness) / 1000;
                const weightKg = (volumeCm3 * density) / 1000 * quantity;
                
                return parseFloat(weightKg.toFixed(2));
            } catch (e) {
                return 0;
            }
        }

        // 计算运费
        function calculateFreight(company, province, weight) {
            if (!province || weight <= 0) return { price: 0, formula: '' };

            try {
                const data = freightData[company];
                if (!data || !data[province]) {
                    return { price: 0, formula: '无运费数据' };
                }

                let price = 0;
                let formula = '';

                switch (company) {
                    case 'aneng':
                        const aneng = data[province];
                        const anengCalculated = weight * aneng.per_kg_fee;
                        price = Math.max(aneng.start_fee, anengCalculated);
                        formula = `max(${aneng.start_fee}元, ${weight}kg × ${aneng.per_kg_fee}元/kg)`;
                        break;
                        
                    case 'shentong':
                        const shentong = data[province];
                        if (weight <= 1) {
                            price = shentong.first_kg_fee;
                            formula = `${shentong.first_kg_fee}元 (首重)`;
                        } else {
                            price = shentong.first_kg_fee + (weight - 1) * shentong.additional_kg_fee;
                            formula = `${shentong.first_kg_fee}元 + (${weight}kg - 1kg) × ${shentong.additional_kg_fee}元/kg`;
                        }
                        break;
                        
                    case 'shunxin':
                        const shunxin = data[province];
                        const shunxinCalculated = weight * shunxin.per_kg_fee;
                        price = Math.max(shunxin.start_fee, shunxinCalculated);
                        formula = `max(${shunxin.start_fee}元, ${weight}kg × ${shunxin.per_kg_fee}元/kg)`;
                        break;
                }

                return { price: parseFloat(price.toFixed(2)), formula };
            } catch (e) {
                return { price: 0, formula: '计算错误' };
            }
        }

        // 渲染重量信息
        function renderWeightInfo(weights) {
            const container = document.getElementById('weightInfo');
            container.innerHTML = '';
            
            let totalWeight = 0;
            
            weights.forEach((weight, index) => {
                if (weight > 0) {
                    totalWeight += weight;
                    
                    const div = document.createElement('div');
                    div.className = 'bg-gray-50 p-4 rounded-lg text-center';
                    div.innerHTML = `
                        <p class="text-sm text-gray-600">规格 ${index + 1}</p>
                        <p class="text-2xl font-bold text-blue-600">${weight} kg</p>
                    `;
                    container.appendChild(div);
                }
            });

            document.getElementById('totalWeight').textContent = `${totalWeight.toFixed(2)} kg`;
            return totalWeight;
        }

        // 渲染运费对比
        function renderFreightComparison(province, totalWeight, weights) {
            const container = document.getElementById('freightComparison');
            container.innerHTML = '';
            
            const companies = [
                { id: 'aneng', name: '安能物流', color: 'bg-blue-100 text-blue-800' },
                { id: 'shentong', name: '申通快递', color: 'bg-orange-100 text-orange-800' },
                { id: 'shunxin', name: '顺心捷达', color: 'bg-green-100 text-green-800' }
            ];
            
            const results = [];
            
            companies.forEach(company => {
                const result = calculateFreight(company.id, province, totalWeight);
                
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-200 hover:bg-gray-50 transition-colors';
                
                row.innerHTML = `
                    <td class="px-4 py-3">
                        <div class="font-semibold">${company.name}</div>
                    </td>
                    <td class="px-4 py-3 text-center">
                        <div class="text-sm text-gray-600">${result.formula}</div>
                    </td>
                    <td class="px-4 py-3 text-center">
                        <div class="text-xl font-bold ${company.color} px-3 py-1 rounded-full">
                            ¥${result.price.toFixed(2)}
                        </div>
                    </td>
                    <td class="px-4 py-3 text-center" id="${company.id}-saving">
                        <div class="text-sm text-gray-600">-</div>
                    </td>
                `;
                
                container.appendChild(row);
                results.push({ company: company.name, price: result.price, color: company.color });
            });

            // 计算节省金额
            if (results.length > 0) {
                const minPrice = Math.min(...results.map(r => r.price));
                results.forEach(result => {
                    const saving = result.price - minPrice;
                    const savingElement = document.getElementById(`${companies.find(c => c.name === result.company).id}-saving`);
                    
                    if (saving > 0) {
                        savingElement.innerHTML = `
                            <div class="text-sm font-semibold text-red-600">
                                ¥${saving.toFixed(2)}
                            </div>
                        `;
                    } else if (saving === 0 && result.price === minPrice) {
                        savingElement.innerHTML = `
                            <div class="text-sm font-semibold text-green-600">
                                <i class="fas fa-trophy mr-1"></i>最优
                            </div>
                        `;
                    }
                });
            }

            return results;
        }

        // 渲染图表
        function renderChart(results) {
            const ctx = document.getElementById('freightChart').getContext('2d');
            
            // 清除旧图表
            if (window.freightChartInstance) {
                window.freightChartInstance.destroy();
            }
            
            const colors = results.map(r => {
                if (r.color.includes('blue')) return '#3B82F6';
                if (r.color.includes('orange')) return '#F97316';
                if (r.color.includes('green')) return '#10B981';
                return '#6B7280';
            });
            
            window.freightChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: results.map(r => r.company),
                    datasets: [{
                        label: '运费 (元)',
                        data: results.map(r => r.price),
                        backgroundColor: colors,
                        borderColor: colors.map(color => color),
                        borderWidth: 2,
                        borderRadius: 8,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleColor: 'white',
                            bodyColor: 'white',
                            borderColor: 'rgba(255, 255, 255, 0.2)',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    return `运费: ¥${context.parsed.y.toFixed(2)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.1)'
                            },
                            ticks: {
                                callback: function(value) {
                                    return '¥' + value;
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    },
                    animation: {
                        duration: 1000,
                        easing: 'easeOutBounce'
                    }
                }
            });
        }

        // 渲染推荐方案
        function renderRecommendation(results) {
            if (results.length === 0) return;
            
            const minPrice = Math.min(...results.map(r => r.price));
            const recommended = results.find(r => r.price === minPrice);
            
            document.getElementById('recommendedCompany').textContent = recommended.company;
            document.getElementById('recommendedPrice').textContent = `¥${recommended.price.toFixed(2)}`;
            
            const recommendationDiv = document.getElementById('recommendation');
            recommendationDiv.className = `bg-gradient-to-r from-green-500 to-blue-500 rounded-xl shadow-lg p-6 text-white`;
            
            if (recommended.company === '安能物流') {
                recommendationDiv.className = `bg-gradient-to-r from-blue-500 to-indigo-600 rounded-xl shadow-lg p-6 text-white`;
            } else if (recommended.company === '申通快递') {
                recommendationDiv.className = `bg-gradient-to-r from-orange-500 to-red-600 rounded-xl shadow-lg p-6 text-white`;
            } else if (recommended.company === '顺心捷达') {
                recommendationDiv.className = `bg-gradient-to-r from-green-500 to-emerald-600 rounded-xl shadow-lg p-6 text-white`;
            }
        }

        // 计算按钮点击事件
        document.getElementById('calculateBtn').addEventListener('click', function() {
            const destination = document.getElementById('destination').value;
            const specInputs = document.querySelectorAll('#specifications input[type="text"]');
            const quantityInputs = document.querySelectorAll('#specifications input[type="number"]');
            
            // 验证输入
            if (!destination) {
                alert('请选择目的地省份');
                return;
            }
            
            let hasValidInput = false;
            const weights = [];
            
            // 计算每个规格的重量
            for (let i = 0; i < specInputs.length; i++) {
                const spec = specInputs[i].value.trim();
                const quantity = parseInt(quantityInputs[i].value) || 1;
                
                if (spec) {
                    hasValidInput = true;
                    const weight = calculateWeight(spec, quantity);
                    weights.push(weight);
                } else {
                    weights.push(0);
                }
            }
            
            if (!hasValidInput) {
                alert('请至少输入一个锯条规格');
                return;
            }
            
            // 显示结果区域
            document.getElementById('resultArea').classList.remove('hidden');
            
            // 渲染重量信息
            const totalWeight = renderWeightInfo(weights);
            
            // 渲染运费对比
            const results = renderFreightComparison(destination, totalWeight, weights);
            
            // 渲染图表
            renderChart(results);
            
            // 渲染推荐方案
            renderRecommendation(results);
            
            // 滚动到结果区域
            document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
        });

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', function() {
            initProvinces();
        });
    </script>
</body>
</html>
