        // 所有省份列表

<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-6">
        <!-- 标题区域 -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">
                <i class="fas fa-truck text-blue-600 mr-2"></i>锯条运费计算器
            </h1>
            <p class="text-gray-600">快速对比三家物流公司运费</p>
        </div>

        <!-- 输入区域 -->
        <div class="bg-white rounded-lg border border-gray-200 p-5 mb-6">
            <!-- 目的地选择 -->
            <div class="mb-5">
                <label for="destination" class="block text-gray-700 font-medium mb-2">
                    <i class="fas fa-map-marker-alt text-red-500 mr-2"></i>目的地省份
                </label>
                <select id="destination" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="">请选择目的地省份</option>
                </select>
            </div>

            <!-- 锯条规格输入 -->
            <div class="mb-5">
                <h3 class="text-lg font-semibold text-gray-800 mb-3">
                    <i class="fas fa-ruler text-green-500 mr-2"></i>锯条规格与数量
                </h3>
                <div class="flex items-center space-x-2 mb-2">
                    <span class="text-sm text-gray-600 w-24">规格 (长*宽*厚)</span>
                    <span class="text-sm text-gray-600 w-16">数量</span>
                </div>
                
                <div class="space-y-3" id="specifications">
                    <!-- 基础输入组 -->
                    <div class="flex items-center space-x-3">
                        <input type="text" placeholder="例如: 6250*100*1.05" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <input type="number" placeholder="数量" min="1" value="1" class="w-24 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>
                
                <!-- 添加规格按钮 -->
                <button id="addSpecBtn" class="mt-3 text-blue-600 hover:text-blue-800 text-sm flex items-center">
                    <i class="fas fa-plus mr-1"></i> 添加规格
                </button>
            </div>

            <!-- 计算按钮 -->
            <div class="text-center">
                <button id="calculateBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-all">
                    <i class="fas fa-calculator mr-2"></i>计算运费
                </button>
            </div>
        </div>

        <!-- 结果区域 -->
        <div id="resultArea" class="hidden">
            <!-- 重量信息 -->
            <div class="bg-white rounded-lg border border-gray-200 p-5 mb-5">
                <h3 class="text-lg font-semibold text-gray-800 mb-3">
                    <i class="fas fa-weight text-orange-500 mr-2"></i>锯条重量信息
                </h3>
                <div class="flex justify-between items-center pt-3 border-t border-gray-200">
                    <span class="text-lg font-semibold text-gray-800">总重量:</span>
                    <span id="totalWeight" class="text-xl font-bold text-blue-600">0 kg</span>
                </div>
            </div>

            </div>

            <!-- 运费对比表格 -->
            <div class="bg-white rounded-lg border border-gray-200 p-5 mb-5">
                <h3 class="text-lg font-semibold text-gray-800 mb-3">
                    <i class="fas fa-table text-purple-500 mr-2"></i>运费对比
                </h3>
                <div class="overflow-x-auto">
                    <table class="w-full table-auto">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="px-3 py-2 text-left text-gray-700 font-semibold">物流公司</th>
                                <th class="px-3 py-2 text-center text-gray-700 font-semibold">运费</th>
                            </tr>
                        </thead>
                        <tbody id="freightComparison">
                            <!-- 运费对比信息动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 推荐方案 -->
            <div id="recommendation" class="bg-blue-500 rounded-lg p-5 text-white">
                <h3 class="text-lg font-semibold mb-3">
                    <i class="fas fa-star mr-2"></i>推荐方案
                </h3>
                <div class="flex flex-col md:flex-row items-center justify-between">
                    <div>
                        <p class="text-base mb-1">推荐选择：</p>
                        <p id="recommendedCompany" class="text-xl font-bold"></p>
                    </div>
                    <div class="mt-3 md:mt-0 text-right">
                        <p class="text-base">预计运费：</p>
                        <p id="recommendedPrice" class="text-2xl font-bold"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化省份下拉框
        function initProvinces() {
            const select = document.getElementById('destination');
            allProvinces.forEach(province => {
                const option = document.createElement('option');
                option.value = province;
                option.textContent = province;
                select.appendChild(option);
            });
        }

        // 添加规格输入框
        function addSpecInput() {
            const container = document.getElementById('specifications');
            const div = document.createElement('div');
            div.className = 'flex items-center space-x-3';
            div.innerHTML = `
                <input type="text" placeholder="例如: 6250*100*1.05" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                <input type="number" placeholder="数量" min="1" value="1" class="w-24 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            `;
            container.appendChild(div);
        }

        // 计算锯条重量
        function calculateWeight(spec, quantity) {
            try {
                const [length, width, thickness] = spec.split('*').map(Number);
                if (isNaN(length) || isNaN(width) || isNaN(thickness)) return 0;
                const density = 7.85; // 钢的密度 g/cm³
                const volumeCm3 = (length * width * thickness) / 1000;
                const weightKg = (volumeCm3 * density) / 1000 * quantity;
                return parseFloat(weightKg.toFixed(2));
            } catch (e) {
                return 0;
            }
        }

        // 计算运费
        function calculateFreight(company, province, weight) {
            if (!province || weight <= 0) return { price: 0 };
            try {
                const data = freightData[company];
                if (!data || !data[province]) return { price: 0 };

                let price = 0;
                switch (company) {
                    case 'aneng':
                        const aneng = data[province];
                        const anengCalculated = weight * aneng.per_kg_fee;
                        price = Math.max(aneng.start_fee, anengCalculated);
                        break;
                    case 'shentong':
                        const shentong = data[province];
                        price = weight <= 1 ? shentong.first_kg_fee : shentong.first_kg_fee + (weight - 1) * shentong.additional_kg_fee;
                        break;
                    case 'shunxin':
                        const shunxin = data[province];
                        const shunxinCalculated = weight * shunxin.per_kg_fee;
                        price = Math.max(shunxin.start_fee, shunxinCalculated);
                        break;
                }
                return { price: parseFloat(price.toFixed(2)) };
            } catch (e) {
                return { price: 0 };
            }
        }

        // 渲染重量信息
        function renderWeightInfo() {
            const inputs = document.querySelectorAll('#specifications input[type="text"]');
            const quantityInputs = document.querySelectorAll('#specifications input[type="number"]');
            let totalWeight = 0;

            inputs.forEach((input, index) => {
                const spec = input.value.trim();
                const quantity = parseInt(quantityInputs[index].value) || 1;
                if (spec) {
                    const weight = calculateWeight(spec, quantity);
                    totalWeight += weight;
                }
            });

            document.getElementById('totalWeight').textContent = `${totalWeight.toFixed(2)} kg`;
            return totalWeight;
        }

        // 渲染运费对比
        function renderFreightComparison(province, totalWeight) {
            const container = document.getElementById('freightComparison');
            container.innerHTML = '';
            
            const companies = [
                { id: 'aneng', name: '安能物流' },
                { id: 'shentong', name: '申通快递' },
                { id: 'shunxin', name: '顺心捷达' }
            ];
            
            const results = [];
            companies.forEach(company => {
                const { price } = calculateFreight(company.id, province, totalWeight);
                results.push({ ...company, price });
                
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-100';
                tr.innerHTML = `
                    <td class="px-3 py-3 text-left">${company.name}</td>
                    <td class="px-3 py-3 text-center font-medium">${price > 0 ? `¥${price}` : '无数据'}</td>
                `;
                container.appendChild(tr);
            });

            // 推荐最优方案
            const best = results.filter(item => item.price > 0).sort((a, b) => a.price - b.price)[0];
            if (best) {
                document.getElementById('recommendedCompany').textContent = best.name;
                document.getElementById('recommendedPrice').textContent = `¥${best.price}`;
            }
        }

        // 初始化页面
        window.onload = function() {
            initProvinces();
            
            // 添加规格按钮事件
            document.getElementById('addSpecBtn').addEventListener('click', addSpecInput);
            
            // 计算按钮事件
            document.getElementById('calculateBtn').addEventListener('click', function() {
                const province = document.getElementById('destination').value;
                if (!province) {
                    alert('请选择目的地省份');
                    return;
                }

                const totalWeight = renderWeightInfo();
                if (totalWeight <= 0) {
                    alert('请填写有效的锯条规格');
                    return;
                }

                renderFreightComparison(province, totalWeight);
                document.getElementById('resultArea').classList.remove('hidden');
            });
        };
    </script>
</body>
</html>
